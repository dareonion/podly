name: Build and test

# Builds the app and runs all JVM unit tests (app + generator) so regressions
# surface on push instead of at the next local build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and run unit tests
        # -Dorg.gradle.java.home overrides the Mac path baked into gradle.properties.
        run: ./gradlew assembleDebug testDebugUnitTest :generator:test --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"
