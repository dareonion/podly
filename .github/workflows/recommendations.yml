name: Generate recommendations

# Generates the static recent-episode + acclaimed recommendation JSON with Claude
# and publishes it to GitHub Pages. The app fetches these files instead of calling
# Claude on-device. Runs weekly; trigger manually for the first publish.
on:
  schedule:
    - cron: "0 8 * * 1" # Mondays at 08:00 UTC — adjust cadence here
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't run two publishes at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: Generate recommendation JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Absolute path: the Gradle run task's working dir is generator/, not the
          # repo root, so a relative OUTPUT_DIR would miss the upload step's `site`.
          OUTPUT_DIR: ${{ github.workspace }}/site
        # --configure-on-demand skips the Android :app module (no SDK needed here).
        run: ./gradlew :generator:run --configure-on-demand --no-daemon

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
